<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial, sans-serif;
    }

    .calculator {
      background: #1e1e2f;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }

    #display {
      width: 100%;
      height: 60px;
      font-size: 24px;
      text-align: right;
      padding: 10px;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
      background: #000;
      color: #0f0;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 70px);
      gap: 10px;
    }

    button {
      height: 60px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .num {
      background: #2e2e44;
      color: white;
    }

    .op {
      background: #ff9500;
      color: white;
    }

    .equal {
      background: #28a745;
      color: white;
      grid-column: span 2;
    }

    .clear {
      background: #dc3545;
      color: white;
    }
  </style>
</head>

<body>

<div class="calculator">
  <input type="text" id="display" readonly>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="op" onclick="deleteLast()">⌫</button>
    <button class="op" onclick="append('/')">/</button>
    <button class="op" onclick="append('*')">*</button>

    <button class="num" onclick="append('7')">7</button>
    <button class="num" onclick="append('8')">8</button>
    <button class="num" onclick="append('9')">9</button>
    <button class="op" onclick="append('-')">-</button>

    <button class="num" onclick="append('4')">4</button>
    <button class="num" onclick="append('5')">5</button>
    <button class="num" onclick="append('6')">6</button>
    <button class="op" onclick="append('+')">+</button>

    <button class="num" onclick="append('1')">1</button>
    <button class="num" onclick="append('2')">2</button>
    <button class="num" onclick="append('3')">3</button>
    <button class="equal" onclick="calculate()">=</button>

    <button class="num" onclick="append('0')">0</button>
    <button class="num" onclick="append('.')">.</button>
  </div>
</div>

<script>
  let display = document.getElementById("display");

  function append(value) {
    display.value += value;
  }

  function clearDisplay() {
    display.value = "";
  }

  function deleteLast() {
    display.value = display.value.slice(0, -1);
  }

  function calculate() {
    try {
      display.value = eval(display.value);
    } catch {
      display.value = "Error";
    }
  }

  // Keyboard support
  document.addEventListener("keydown", function(event) {
    const key = event.key;

    if (!isNaN(key) || "+-*/.".includes(key)) {
      append(key);
    } else if (key === "Enter") {
      calculate();
    } else if (key === "Backspace") {
      deleteLast();
    } else if (key === "Escape") {
      clearDisplay();
    }
  });
</script>

</body>
</html>
